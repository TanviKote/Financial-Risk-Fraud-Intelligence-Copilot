services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: risk-postgres
    environment:
      POSTGRES_DB: riskdb
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_pass
    ports:
      - "5432:5432"
    volumes:
      - risk_pgdata:/var/lib/postgresql/data
      - ../sql/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
      - ../sql/003_sample_data.sql:/docker-entrypoint-initdb.d/003_sample_data.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: risk-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: risk-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  risk_pgdata:
