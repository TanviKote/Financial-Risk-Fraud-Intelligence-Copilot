spring:
  application:
    name: financial-risk-fraud-copilot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/riskdb}
    username: ${SPRING_DATASOURCE_USERNAME:risk_user}
    password: ${SPRING_DATASOURCE_PASSWORD:risk_pass}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-copilot-consumer-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    producer:
      properties:
        spring.json.add.type.headers: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
app:
  kafka:
    transaction-topic: transaction-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG